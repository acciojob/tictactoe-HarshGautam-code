
<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
background:#f2f2f2;
font-family:Arial;
text-align:center;
}

.container{
margin-top:30px;
}

h1{
font-size:40px;
}

.board{
width:300px;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
}

.cell{
height:100px;
border:2px solid black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
background:#e8a9b0;   /* pink cells */
}

.message{
font-size:22px;
margin-top:15px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

.winner{
background:#8a008a !important; /* purple winner cells */
color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div id="input-section">

Player 1
<input id="player-1" placeholder="enter name">

<br>

Player 2
<input id="player-2" placeholder="enter name">

<br><br>

<button id="submit">Start Game</button>

</div>

<div class="message"></div>

<div id="board" class="board" style="display:none">

<div class="cell" id="1"></div>
<div class="cell" id="2"></div>
<div class="cell" id="3"></div>

<div class="cell" id="4"></div>
<div class="cell" id="5"></div>
<div class="cell" id="6"></div>

<div class="cell" id="7"></div>
<div class="cell" id="8"></div>
<div class="cell" id="9"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
